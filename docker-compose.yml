# ============================================================================
# Docker Compose Configuration for BESS Analytics Platform
# ============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment:
    &airflow-common-env
    ENTSOE_API_KEY: ${ENTSOE_API_KEY}
    
    # Core Configurations
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__LOGGING__LOGGING_LEVEL: ${AIRFLOW__LOGGING__LOGGING_LEVEL}
    
    # Wymuszenie Airflow Home w wewnętrznym folderze projektu (.airflow)
    AIRFLOW_HOME: /opt/airflow/home
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/    
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORD_SECRET: /opt/airflow/home/config/auth.json
    
    PYTHONPATH: /opt/airflow

  volumes:
    - ./.airflow:/opt/airflow/home
    - ./dags:/opt/airflow/home/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/home/logs
    - ./data:/opt/airflow/data
    - ./config/auth.json:/opt/airflow/home/config/auth.json:ro
  
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  
  airflow-init:
    <<: *airflow-common
    user: "0:0"
    command: >
      bash -c "mkdir -p /opt/airflow/home/logs/dag_processor /opt/airflow/home/config && chown -R 50000:0 /opt/airflow/home && gosu airflow airflow db migrate"
  
  airflow-webserver:
    <<: *airflow-common
    command: api-server --host 0.0.0.0
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
  
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always
  
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
  
  bess-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: streamlit run src/streamlit/app.py
    restart: always

volumes:
  postgres_data: