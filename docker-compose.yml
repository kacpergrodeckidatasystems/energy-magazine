x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__LOGGING__LOGGING_LEVEL: ${AIRFLOW__LOGGING__LOGGING_LEVEL}
    
    # Przekazujemy poprawną zmienną strukturalną Airflow 3 z pliku .env
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: ${AIRFLOW__CORE__EXECUTION_API_SERVER_URL}
    
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS}
    PYTHONPATH: ${PYTHONPATH}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS}
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORD_SECRET: /opt/airflow/config/auth.json

  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/plugins/src        
    - ./src:/opt/airflow/src                
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data     
    - ./config/auth.json:/opt/airflow/config/auth.json:ro         
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # --- METADATA STORAGE LAYER ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # --- AUTOMATED DATABASE INITIALIZATION & MIGRATIONS ---
  airflow-init:
    <<: *airflow-common
    user: "0:0"
    command: >
      bash -c "mkdir -p /opt/airflow/logs/dag_processor && chmod -R 777 /opt/airflow/logs && airflow db migrate"

  # --- AIRFLOW 3 CORE API & UI SERVER ---
  airflow-webserver:
    <<: *airflow-common
    # POPRAWKA: Dodajemy flagę --port, aby uvicorn zbindował endpoint dla Task SDK na porcie 9091
    command: api-server --host 0.0.0.0 
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/ui/"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # --- AIRFLOW 3 DAG PROCESSOR ---
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always

  # --- SCHEDULER & PIPELINE EXECUTION ENGINE ---
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # --- STREAMLIT ANALYTICAL SCADA DASHBOARD ---
  bess-dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    command: streamlit run src/streamlit/app.py
    restart: always

volumes:
  postgres_data: